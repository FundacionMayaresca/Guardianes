<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EducAR: Fauna Nativa</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        #btn-info {
            pointer-events: auto;
            padding: 12px 24px;
            background: #2E7D32; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none; /* Se mostrará cuando se escanee la imagen */
        }
        
        #info-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 15px;
            display: none; 
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #info-panel h3 { margin: 0 0 10px 0; color: #333; }
        #info-panel p { margin: 0; font-size: 14px; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="info-panel">
            <h3>Jaguar Sudamericano (Panthera onca)</h3>
            <p>El felino más imponente de Sudamérica. Es vital para la conservación de nuestros ecosistemas, manteniendo el equilibrio de la selva y los llanos.</p>
        </div>
        <button id="btn-info">Ver Información</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./myrsc.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-jaguar" src="./jaguar.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 2 1"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-gltf-model id="jaguar-pantalla" 
                          src="#modelo-jaguar" 
                          position="0 -0.5 -3" 
                          scale="0.5 0.5 0.5" 
                          rotation="0 0 0" 
                          visible="false" 
                          animation-mixer>
            </a-gltf-model>
        </a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="marcador">
            <a-gltf-model id="jaguar-marcador" 
                          src="#modelo-jaguar" 
                          position="0 0 0" 
                          scale="0.5 0.5 0.5" 
                          rotation="0 0 0" 
                          animation-mixer>
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnInfo = document.querySelector("#btn-info");
            const infoPanel = document.querySelector("#info-panel");
            const marcador = document.querySelector('#marcador');
            
            const jaguarMarcador = document.querySelector('#jaguar-marcador');
            const jaguarPantalla = document.querySelector('#jaguar-pantalla');

            let yaSeEscaneoUnaVez = false;

            // Mostrar el panel de información al hacer clic
            btnInfo.addEventListener("click", () => {
                infoPanel.style.display = infoPanel.style.display === "block" ? "none" : "block";
                btnInfo.innerText = infoPanel.style.display === "block" ? "Ocultar Información" : "Ver Información";
            });

            // CUANDO DETECTA LA IMAGEN
            marcador.addEventListener("targetFound", () => {
                console.log("Imagen en vista.");
                yaSeEscaneoUnaVez = true;
                
                // Mostramos el botón de información
                btnInfo.style.display = "block";

                // Mostramos el modelo sobre la imagen y ocultamos el de la pantalla
                jaguarMarcador.setAttribute("visible", "true");
                jaguarPantalla.setAttribute("visible", "false");
            });

            // CUANDO PIERDE LA IMAGEN DE VISTA
            marcador.addEventListener("targetLost", () => {
                console.log("Imagen perdida.");
                
                // Si ya escaneamos al menos una vez, activamos la persistencia en pantalla
                if (yaSeEscaneoUnaVez) {
                    // Ocultamos el modelo de la imagen (que ya no se ve de todas formas)
                    jaguarMarcador.setAttribute("visible", "false");
                    
                    // ENCENDEMOS el modelo anclado a la pantalla
                    jaguarPantalla.setAttribute("visible", "true");
                }
            });
        });
    </script>
</body>
</html>
