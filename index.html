<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EducAR: Jaguar</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        #btn-jaguar {
            pointer-events: auto;
            padding: 12px 24px;
            background: #E65100; /* Naranja fuerte */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        #btn-jaguar:active { transform: scale(0.95); }
        
        #info-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 15px;
            display: none; /* Oculto inicialmente */
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #info-panel h3 { margin: 0 0 10px 0; color: #333; }
        #info-panel p { margin: 0; font-size: 14px; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="info-panel">
            <h3>Jaguar (Panthera onca)</h3>
            <p>El felino más grande de América. Es un depredador clave que ayuda a mantener el equilibrio de los ecosistemas donde habita.</p>
        </div>
        <button id="btn-jaguar">Ver Información</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./myrsc.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-jaguar" src="./jaguar.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 2 1"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="marcador">
            
            <a-entity id="contenedor-modelos">
                <a-gltf-model src="#modelo-jaguar" 
                              position="0 0 0" 
                              scale="0.5 0.5 0.5" 
                              rotation="0 0 0" 
                              animation-mixer>
                </a-gltf-model>
            </a-entity>

        </a-entity>
    </a-scene>

<script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnJaguar = document.querySelector("#btn-jaguar");
            const infoPanel = document.querySelector("#info-panel");
            const marcador = document.querySelector('#marcador');
            const contenedorModelos = document.querySelector('#contenedor-modelos');
            const escena = document.querySelector('a-scene');

            let modeloDesacoplado = false;

            // Mostrar el panel de información al hacer clic
            btnJaguar.addEventListener("click", () => {
                infoPanel.style.display = infoPanel.style.display === "block" ? "none" : "block";
                btnJaguar.innerText = infoPanel.style.display === "block" ? "Ocultar Información" : "Ver Información";
            });

            // LÓGICA DE PERSISTENCIA
            marcador.addEventListener("targetFound", () => {
                console.log("¡Imagen detectada!");
                
                // Solo desacoplamos la primera vez
                if (!modeloDesacoplado) {
                    
                    // EL SECRETO: ESPERAR A QUE SE ESTABILICE EL TRACKING
                    // 500 a 800 milisegundos suele ser perfecto.
                    setTimeout(() => {
                        console.log("Estabilizando coordenadas y desacoplando...");

                        // 1. Crear variables de Three.js para guardar la posición
                        const posicionMundo = new THREE.Vector3();
                        const rotacionMundo = new THREE.Quaternion();
                        const escalaMundo = new THREE.Vector3();

                        // 2. Extraer las coordenadas actuales del contenedor en el mundo real
                        contenedorModelos.object3D.getWorldPosition(posicionMundo);
                        contenedorModelos.object3D.getWorldQuaternion(rotacionMundo);
                        contenedorModelos.object3D.getWorldScale(escalaMundo);

                        // 3. Quitar el contenedor del marcador
                        marcador.removeChild(contenedorModelos);
                        
                        // 4. Añadir el contenedor a la escena global
                        escena.appendChild(contenedorModelos);

                        // 5. Aplicar las coordenadas guardadas al contenedor
                        contenedorModelos.object3D.position.copy(posicionMundo);
                        contenedorModelos.object3D.quaternion.copy(rotacionMundo);
                        contenedorModelos.object3D.scale.copy(escalaMundo);

                        modeloDesacoplado = true;
                        console.log("Modelo fijado permanentemente en el espacio.");
                    }, 800); // <-- ESTE ES EL DELAY CLAVE (800ms)
                }
            });
        });
    </script>
</body>
</html>
